<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="icon" type="image/jpg" sizes="32x32" href="images/logo.png" />
        <title>Products</title>
        <!-- <link rel="stylesheet" type="text/css" href="st.css"> -->


<style>

    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

.header{
    display: flex;
    position: absolute;
    top: 0;
    left: 0;
    justify-content: space-between;
    align-items: center;
    text-decoration: none;
    /* border: solid 2px none;
    background-color: #E6E6E6; */
    padding: 10px 60px;
    width: 100%;
    background: white;
}

.logo img{
    width: 50px;
}

.nav ul{
    display: flex;
    list-style: none;
    gap: 30px;
}

.nav li{
    margin-left: 20px;
}

.nav ul li a{
    text-decoration: none;
    font-weight: 500;
}

            *{
                margin:0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, Helvetica, sans-serif;
            }

            body{
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                margin-top: 70px;
                background-image: url(images/background.jpg);
                background-size: cover;
                background-position: center;
            }

            .container{
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .login-form{
                width: 320px;
                padding: 50px 40px;
                border: 1px solid white;
                border-radius: 25px;

                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(10px);
                color: white;
            }

            .login-form h1{
                text-align: center;
                margin-bottom: 30px;
            }

            .input-box{
                margin-bottom: 20px;
            }

            .input-box label{
                font-size: 14px;
            }

            .input-box input{
                width: 100%;
                border: none;
                border-bottom: 2px solid white;
                background: transparent;
                padding: 8px 0;
                margin-top: 8px;
                color: white;
                outline: none;
            }

            .options{
                display: flex;
                justify-content: space-between;
                font-size: 13px;
                margin-top: 15px;
                margin-bottom: 25px;
            }

            .options a{
                color: white;
                text-decoration: none;
            }

            .options a:hover{
                text-decoration: underline;
            }

            .options label{
                display: flex;
                align-items: center;
                gap: 5px;
            }

            button{
                width: 100%;
                padding: 10px;
                border: none;
                border-radius: 20px;
                background: white;
                color: black;
                font-weight: bold;
                cursor: pointer;
            }

            button:hover{
                text-decoration: underline;
            }

            .register{
                text-align: center;
                margin-top: 20px;
                font-size: 14px;
            }

            .register a{
                color: white;
                text-decoration: none;
            }

            .register a:hover{
                text-decoration:underline;
            }
        </style>
        
    </head>
    <body>
                <div class="header">
            <div class="logo">
                <img src="images/logo.png">
            </div>

            <div class="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="aboutus.html">About Us</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="contactus.html">Contact Us</a></li>
                    <li><a href="google.html">Google</a></li>
                </ul>
            </div>

        </div>

        <div class="container">

            <form class="login-form">

                <h1>Login</h1>
                
                <div class="input-box">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

                <div class="input-box">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox" name="remember_me"> Remember Me
                    </label>

                    <a href="#">Forget Password</a>
                </div>

                <button type="submit">Log in</button>

                <p class="register">
                    Don't have an account?
                    <a href="#">Register</a>
                </p>

            </form>

        </div>

    </body>
</html>
